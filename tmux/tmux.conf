set -s default-terminal "tmux-256color"
set -g status-style "bg=colour17,fg=colour27"
set -g default-command "pwsh"
set -g mouse on
bind-key -T copy-mode Enter send-keys -X cancel
set -ag terminal-overrides ",tmux-256color:Ms=\\E]52;c;%p2%s\\7"
set -ag terminal-overrides ",xterm-256color:Ms=\\E]52;c;%p2%s\\7"

# sets tmux to use OSC 52 escape
set -g set-clipboard on

# Forces tmux to use the "c;" option
set -ag terminal-overrides "vte*:XT:Ms=\\E]52;c;%p2%s\\7,xterm*:XT:Ms=\\E]52;c;%p2%s\\7"

run-shell ~/.tmux/plugins/tmux-minimal-theme/minimal.tmux

# more backscroll:
set-option -g history-limit 250000
set-option -g set-titles on
set-option -g set-titles-string "(#h) #W"

# Allow escape sequences to pass through to the outer terminal (VS Code)
set -g allow-passthrough on

# Update VSCode environment variables when attaching
set-option -g update-environment "VSCODE_IPC_HOOK_CLI VSCODE_GIT_IPC_HANDLE VSCODE_GIT_ASKPASS_NODE VSCODE_GIT_ASKPASS_MAIN"

# Mouse selection behavior (like VSCode / Windows Terminal)
# Keep selection visible after mouse drag release (don't auto-copy)
bind-key -T copy-mode MouseDragEnd1Pane \
    send-keys -X copy-pipe-no-clear "sh -c ' \
        sel=\$(cat); \
        if [ \${#sel} -lt 2 ]; then \
            tmux send-keys -X cancel; \
        else \
            tmux delete-buffer 2>/dev/null; \
        fi'" \; \
    select-pane

# Double/triple-click selects word/line without auto-copy
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line
bind-key -T root DoubleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-word
bind-key -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line

# Ctrl-C in copy mode: copy selection to clipboard and exit
bind-key -T copy-mode C-c send-keys -X copy-pipe-and-cancel

# Right-click in copy mode: copy selection to clipboard and exit
bind-key -T copy-mode MouseDown3Pane send-keys -X copy-pipe-and-cancel

# Right-click in normal mode: paste from buffer
bind-key -T root MouseDown3Pane paste-buffer

# bind alt left/right to switch windows.
bind -n M-Left  previous-window
bind -n M-Right next-window

bind '\' split-window -h
bind '-' split-window -v
unbind '"'
unbind %

# set up claude code status indicators
run-shell ~/src/dotfiles/tmux/update_theme.sh

set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?pane_in_mode,[tmux],#{pane_current_command}}'
